<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>异环都市仿真系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08090d;overflow:hidden;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;color:#e0e0e0}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#08090d;z-index:1000;font-size:16px;color:#888;flex-direction:column;gap:12px}
#loading .spinner{width:32px;height:32px;border:3px solid #333;border-top-color:#4ade80;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#panel{position:fixed;top:12px;right:12px;width:320px;background:rgba(8,9,13,0.95);border:1px solid rgba(255,255,255,0.06);border-radius:14px;backdrop-filter:blur(16px);z-index:100;font-size:12px;max-height:calc(100vh - 24px);overflow-y:auto}
#panel::-webkit-scrollbar{width:4px}#panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.ph{padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,0.04)}.ph h2{font-size:14px;font-weight:700;color:#fff;margin-bottom:6px}
#clock{font-family:'Courier New',monospace;font-size:26px;font-weight:700;color:#4ade80;text-shadow:0 0 15px rgba(74,222,128,0.35);text-align:center;letter-spacing:3px;padding:4px 0}
.clock-label{font-size:10px;color:#555;text-align:center;margin-top:2px}
.ps{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.04)}
.ls{display:flex;gap:8px;padding:8px;border-radius:6px;background:rgba(255,255,255,0.02)}
.lg{flex:1;text-align:center}.lg .lb{font-size:9px;color:#555;margin-bottom:3px}
.dot{width:16px;height:16px;border-radius:50%;margin:0 auto;background:#333;transition:all .3s}
.sr{display:flex;justify-content:space-between;padding:4px 0}.sl{color:#777;font-size:11px}
.sv{font-family:'Courier New',monospace;font-size:13px;font-weight:600;color:#fff}
.g{color:#4ade80}.y{color:#facc15}.r{color:#f87171}
.warn{background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.25);border-radius:6px;padding:6px;margin:6px 0;text-align:center;color:#f87171;font-weight:600;font-size:11px;display:none}
.section-title{font-size:11px;font-weight:600;color:#aaa;margin:10px 0 6px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.04)}
.frow{display:flex;align-items:center;gap:6px;padding:3px 0}
.fname{width:72px;color:#888;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fbar{flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,0.04);overflow:hidden}
.fbar-inner{height:100%;border-radius:3px;transition:width 0.5s ease}
.fval{width:42px;text-align:right;font-family:'Courier New',monospace;font-size:11px;color:#ddd}
.ct{padding:10px 16px;border-top:1px solid rgba(255,255,255,0.04)}
.ct label{display:flex;align-items:center;gap:6px;font-size:11px;color:#999;cursor:pointer;padding:3px 0}
.ct input[type=checkbox]{width:14px;height:14px;accent-color:#4ade80}
.sg{margin:5px 0}.sg label{display:flex;justify-content:space-between;font-size:10px;color:#666;margin-bottom:2px}
.sg input[type=range]{width:100%;accent-color:#60a5fa;height:3px}
.btn{display:block;width:100%;margin-top:6px;padding:6px;border:1px solid rgba(255,255,255,0.06);border-radius:6px;background:rgba(255,255,255,0.02);color:#999;font-size:11px;cursor:pointer;text-align:center;transition:all .2s}
.btn:hover{background:rgba(255,255,255,0.06);color:#fff}
#bldg-list{max-height:140px;overflow-y:auto;font-size:10px;color:#777;background:rgba(0,0,0,0.15);border-radius:4px;padding:4px 6px;margin-top:4px}
.bl-row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.02)}
.bl-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bl-flow{font-family:'Courier New',monospace;color:#bbb;min-width:30px;text-align:right}
#hint{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);font-size:10px;color:#333;z-index:100;pointer-events:none}
#err{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);font-size:12px;color:#f87171;z-index:200;display:none;background:rgba(0,0,0,0.8);padding:8px 16px;border-radius:8px}
</style>
</head>

    <button class="btn" id="br">重置统计</button>
  </div>
</div>

  function calcWaypoints(sx,sz,ex,ez){var wps=[];var cw=CW_POS;var needX=(sx>0)!==(ex>0);var needZ=(sz>0)!==(ez>0);if(!needX&&!needZ){wps.push({x:ex,z:ez});return wps}var crossZ=sz>0?cw:-cw;var crossX=sx>0?cw:-cw;if(needX&&!needZ){var s=sx>0?1:-1;wps.push({x:s*cw,z:sz});wps.push({x:s*cw,z:crossZ});wps.push({x:-s*cw,z:crossZ});wps.push({x:ex,z:ez})}else if(!needX&&needZ){var s=sz>0?1:-1;wps.push({x:sx,z:s*cw});wps.push({x:crossX,z:s*cw});wps.push({x:crossX,z:-s*cw});wps.push({x:ex,z:ez})}else{var sX=sx>0?1:-1,sZ=sz>0?1:-1;wps.push({x:sX*cw,z:sz});wps.push({x:sX*cw,z:crossZ});wps.push({x:-sX*cw,z:crossZ});wps.push({x:-sX*cw,z:sZ*cw});wps.push({x:crossX,z:sZ*cw});wps.push({x:crossX,z:-sZ*cw});wps.push({x:ex,z:ez})}return wps}
  function pedCanGo(p){if(p.isBridge)return true;var cw=CW_POS;if(Math.abs(p.x)<cw-1&&Math.abs(p.z)<cw-1)return true;if(Math.abs(Math.abs(p.z)-cw)<4&&Math.abs(p.x)<ROAD_EDGE)return ctrl.pedCanWalkZ();if(Math.abs(Math.abs(p.x)-cw)<4&&Math.abs(p.z)<ROAD_EDGE)return ctrl.pedCanWalkX();return true}
  function mkPed(){var g=new THREE.Group();var body=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.18,0.8,8),new THREE.MeshStandardMaterial({color:0xcc8866,roughness:0.8}));body.position.y=0.6;g.add(body);var head=new THREE.Mesh(new THREE.SphereGeometry(0.16,8,8),new THREE.MeshStandardMaterial({color:0xddaa88,roughness:0.7}));head.position.y=1.12;g.add(head);var hc=[0xff4444,0x4444ff,0x44ff44,0xffff44,0xff44ff,0x44ffff,0xffffff,0xff8800][~~(Math.random()*8)];var hat=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.2,0.1,8),new THREE.MeshStandardMaterial({color:hc}));hat.position.y=1.3;g.add(hat);return g}
  function spawnBldgPed(){if(peds.length>=MAXP)return;var useBridge=document.getElementById('cb').checked&&Math.random()>0.5;if(useBridge&&bridges.length>0){var br=bridges[~~(Math.random()*bridges.length)];var sign=Math.random()>0.5?1:-1;var sx,sz,ex,ez;if(br.isEW){sx=sign*38;sz=br.cz;ex=-sign*38;ez=br.cz}else{sx=br.cx;sz=sign*38;ex=br.cx;ez=-sign*38}var mesh=mkPed();mesh.position.set(sx,0,sz);scene.add(mesh);peds.push({x:sx,z:sz,ex:ex,ez:ez,mesh:mesh,spd:1+Math.random()*0.4,bridge:br,isBridge:true,wt:0,w:false,cat:null,dstB:null,wps:[],wpIdx:0})}else{var srcIdx=pickBldg();var dstIdx=pickBldg();while(dstIdx===srcIdx&&bldgs.length>1)dstIdx=pickBldg();var src=bldgs[srcIdx],dst=bldgs[dstIdx];var mesh=mkPed();mesh.position.set(src.x,0,src.z);scene.add(mesh);var wps=calcWaypoints(src.x,src.z,dst.x,dst.z);peds.push({x:src.x,z:src.z,mesh:mesh,spd:1.2+Math.random()*0.5,bridge:null,isBridge:false,wt:0,w:false,cat:dst.cat,dstB:dst,wps:wps,wpIdx:0})}}
  function pedInIntersection(){for(var i=0;i<peds.length;i++){var p=peds[i];if(p.isBridge)continue;if(Math.abs(p.x)<ROAD_EDGE&&Math.abs(p.z)<ROAD_EDGE)return true}return false}
  function resolveCollisions(){var all=[];for(var i=0;i<cars.length;i++){if(cars[i].turnState!==1)all.push(cars[i])}for(var i=0;i<scooters.length;i++)all.push(scooters[i]);for(var pass=0;pass<5;pass++){for(var i=0;i<all.length;i++){for(var j=i+1;j<all.length;j++){var a=all[i],b=all[j];var dx=a.x-b.x,dz=a.z-b.z;var d2=dx*dx+dz*dz;var minD=(a.cr||1.3)+(b.cr||0.5);if(d2<minD*minD&&d2>0.0001){var d=Math.sqrt(d2);var push=Math.min((minD-d)*0.52,0.3);var nx=dx/d,nz=dz/d;a.x+=nx*push;a.z+=nz*push;b.x-=nx*push;b.z-=nz*push;if(a.spd>2)a.spd*=0.7;if(b.spd>2)b.spd*=0.7}}}}for(var i=0;i<all.length;i++)all[i].mesh.position.set(all[i].x,0,all[i].z)}

  var stats={thru:0,scThru:0,tw:0,wc:0,ptw:0,pwc:0,col:0,colT:0};
  var sRate=1.0,scRate=0.6,pRate=0.8,sAcc=0,scAcc=0,pAcc=0,startTime=Date.now();

  function sim(dt){
    var qNS=0,qEW=0;for(var i=0;i<cars.length;i++){if(cars[i].w){cars[i].dir==='north'||cars[i].dir==='south'?qNS++:qEW++}}ctrl.update(dt,qNS,qEW);
    sAcc+=dt*sRate;while(sAcc>=1){sAcc-=1;spawnCar()}scAcc+=dt*scRate;while(scAcc>=1){scAcc-=1;spawnScooter()}
    if(document.getElementById('cp').checked){pAcc+=dt*pRate;while(pAcc>=1){pAcc-=1;spawnBldgPed()}}
    // 车辆
    for(var i=cars.length-1;i>=0;i--){var v=cars[i];var ts=getTargetSpeed(v);if(v.turning&&v.turnState===0){var inInt=Math.abs(v.x)<H+2&&Math.abs(v.z)<H+2;if(inInt){var lt=(v.dir==='north'||v.dir==='south')?ctrl.ns():ctrl.ew();if(lt==='green'||(v.wt>2&&!pedInIntersection())){v.turnState=1;v.turnAngleLeft=Math.PI/2;v.targetDir=TURN_MAP[v.dir];v.mx=Math.min(v.mx,8);v.turnCX=v.x-TURN_R*Math.cos(v.heading);v.turnCZ=v.z-TURN_R*Math.sin(v.heading)}}}var acc=v.turnState===1?14:8;var dec=v.turnState===1?10:15;if(v.spd<ts)v.spd=Math.min(ts,v.spd+acc*dt);else v.spd=Math.max(ts,v.spd-dec*dt);if(v.turnState===1){var turnRate=v.spd/TURN_R;var dA=Math.min(turnRate*dt,v.turnAngleLeft);v.heading+=dA;v.turnAngleLeft-=dA;v.x=v.turnCX+TURN_R*Math.cos(v.heading);v.z=v.turnCZ+TURN_R*Math.sin(v.heading);if(v.turnAngleLeft<=0){v.turnState=2;v.dir=v.targetDir;while(v.heading>Math.PI)v.heading-=2*Math.PI;while(v.heading<-Math.PI)v.heading+=2*Math.PI;v.heading=LP[v.targetDir].rot;v.lane=0;v.mx=6+Math.random()*4}}else{v.x+=-Math.sin(v.heading)*v.spd*dt;v.z+=Math.cos(v.heading)*v.spd*dt}v.mesh.rotation.y=-v.heading;v.mesh.position.set(v.x,0,v.z);if(v.spd<0.2){v.wt+=dt;v.w=true}else{v.w=false}if(v.spd<0.3)v.stuckT+=dt;else v.stuckT=0;var inCore=Math.abs(v.x)<H+CW+1&&Math.abs(v.z)<H+CW+1;if(v.stuckT>20&&inCore){stats.thru++;scene.remove(v.mesh);cars.splice(i,1);continue}if(v.stuckT>90){stats.thru++;scene.remove(v.mesh);cars.splice(i,1);continue}if(Math.abs(v.x)>RL+15||Math.abs(v.z)>RL+15){if(v.wt>0.1){stats.tw+=v.wt;stats.wc++}stats.thru++;scene.remove(v.mesh);cars.splice(i,1)}}
    // ★ 电瓶车 — 非机动车道行驶，遇行人停车让行，不产生碰撞事故
    for(var i=scooters.length-1;i>=0;i--){var v=scooters[i],ts=v.mx;var isNS=v.dir==='north'||v.dir==='south';var lt=isNS?ctrl.ns():ctrl.ew();if(lt!=='green'){var d=scDStop(v);if(d>0&&d<30){if(d<0.3)ts=0;else ts=Math.min(ts,Math.sqrt(2*10*Math.max(0,d-0.3)))}}var ah=scAhead(v);if(ah){var sd=1.5;if(ah.d<sd)ts=0;else if(ah.d<sd+4)ts=Math.min(ts,ah.v.spd*((ah.d-sd)/4))}for(var j=0;j<peds.length;j++){var p=peds[j];if(p.isBridge)continue;var dx=p.x-v.x,dz=p.z-v.z;var hx=-Math.sin(LP[v.dir].rot),hz=Math.cos(LP[v.dir].rot);var ah2=dx*hx+dz*hz;var side=Math.abs(-dx*hz+dz*hx);if(ah2>-2&&ah2<10&&side<2.5){if(ah2<2)ts=0;else if(ah2<5)ts=Math.min(ts,0.5);else ts=Math.min(ts,1.5)}}v.spd+=(ts>v.spd?5:-10)*dt;if(v.spd<0)v.spd=0;if(v.spd>v.mx)v.spd=v.mx;var sc=SCL[v.dir];v.x+=sc.dx*v.spd*dt;v.z+=sc.dz*v.spd*dt;v.mesh.position.set(v.x,0,v.z);if(v.spd<0.2){v.wt+=dt;v.w=true}else{v.w=false}if(Math.abs(v.x)>RL+15||Math.abs(v.z)>RL+15){stats.scThru++;scene.remove(v.mesh);scooters.splice(i,1)}}
    // 行人
    for(var i=peds.length-1;i>=0;i--){var p=peds[i];if(p.isBridge){var br=p.bridge;var dx=p.ex-p.x,dz=p.ez-p.z;var dist=Math.sqrt(dx*dx+dz*dz);if(dist<1){scene.remove(p.mesh);peds.splice(i,1);continue}var nx=dx/dist,nz=dist>0?dz/dist:0;p.x+=nx*p.spd*dt;p.z+=nz*p.spd*dt;var pos=br.isEW?p.x:p.z;var ax=Math.abs(pos);if(ax<=br.half)p.mesh.position.y=br.h;else if(ax<=br.half+br.ramp)p.mesh.position.y=br.h*(1-(ax-br.half)/br.ramp);else p.mesh.position.y=0;p.mesh.position.set(p.x,p.mesh.position.y,p.z);continue}if(p.wpIdx>=p.wps.length){catFlow[p.cat]++;p.dstB.flow++;totalFlow++;if(p.wt>0.1){stats.ptw+=p.wt;stats.pwc++}scene.remove(p.mesh);peds.splice(i,1);continue}var wp=p.wps[p.wpIdx];var dx=wp.x-p.x,dz=wp.z-p.z;var dist=Math.sqrt(dx*dx+dz*dz);if(dist<1.5){p.wpIdx++;if(p.wpIdx>=p.wps.length){catFlow[p.cat]++;p.dstB.flow++;totalFlow++;if(p.wt>0.1){stats.ptw+=p.wt;stats.pwc++}scene.remove(p.mesh);peds.splice(i,1);continue}wp=p.wps[p.wpIdx];dx=wp.x-p.x;dz=wp.z-p.z;dist=Math.sqrt(dx*dx+dz*dz)}if(!pedCanGo(p)){p.wt+=dt;p.w=true}else{p.w=false;var nx=dx/dist,nz=dz/dist;p.x+=nx*p.spd*dt;p.z+=nz*p.spd*dt}p.mesh.position.set(p.x,0,p.z)}
    // ★ 只有汽车与行人碰撞才算事故，摩托车只让行
    for(var i=0;i<cars.length;i++){for(var j=0;j<peds.length;j++){var c=cars[i],p=peds[j];if(p.isBridge)continue;var dx=c.x-p.x,dz=c.z-p.z;if(dx*dx+dz*dz<1.44){stats.col++;stats.colT=2;scene.remove(p.mesh);peds.splice(j,1);j--}}}
    resolveCollisions();
    for(var j=0;j<tls.length;j++){var t=tls[j];setL(t.o,t.rd==='ns'?ctrl.ns():ctrl.ew())}
  }

  function ui(){var el=Math.floor((Date.now()-startTime)/1000);var hh=~~(el/3600),mm=~~((el%3600)/60),ss=el%60;document.getElementById('clock').textContent=(hh<10?'0':'')+hh+':'+(mm<10?'0':'')+mm+':'+(ss<10?'0':'')+ss;document.getElementById('st').textContent=stats.thru;document.getElementById('ssc').textContent=stats.scThru;document.getElementById('sp').textContent=totalFlow;document.getElementById('sw').textContent=(stats.wc>0?stats.tw/stats.wc:0).toFixed(1)+'s';document.getElementById('sc').textContent=stats.col;document.getElementById('sa').textContent=cars.length;document.getElementById('ssa').textContent=scooters.length;document.getElementById('spa').textContent=peds.length;var cols={green:'#4ade80',yellow:'#facc15',red:'#f87171'};var ns=ctrl.ns(),ew=ctrl.ew();var nsd=document.getElementById('d-ns');nsd.style.backgroundColor=cols[ns];nsd.style.boxShadow='0 0 8px '+cols[ns];var ewd=document.getElementById('d-ew');ewd.style.backgroundColor=cols[ew];ewd.style.boxShadow='0 0 8px '+cols[ew];var pc=ctrl.phase===0||ctrl.phase===2?'#4ade80':'#f87171';var pd=document.getElementById('d-ped');pd.style.backgroundColor=pc;pd.style.boxShadow='0 0 8px '+pc;document.getElementById('ml').textContent=ctrl.mode==='adaptive'?'自适应':'固定';document.getElementById('tl').textContent=ctrl.timer.toFixed(1)+'s';var warn=document.getElementById('warn');if(stats.colT>0){stats.colT-=0.05;warn.style.display='block'}else{warn.style.display='none'}var maxF=1;for(var k in catFlow)if(catFlow[k]>maxF)maxF=catFlow[k];var cfHTML='';for(var k in CATS){var c=CATS[k];cfHTML+='<div class="frow"><span class="fname">'+c.icon+' '+c.label+'</span><div class="fbar"><div class="fbar-inner" style="width:'+(catFlow[k]/maxF*100)+'%;background:'+c.color+'"></div></div><span class="fval">'+catFlow[k]+'</span></div>'}document.getElementById('cat-flow').innerHTML=cfHTML;var blHTML='';bldgs.forEach(function(b){blHTML+='<div class="bl-row"><span class="bl-name">'+CATS[b.cat].icon+' '+b.name+'</span><span class="bl-flow">'+b.flow+'</span></div>'});document.getElementById('bldg-list').innerHTML=blHTML}

  var drag=false,lx=0,ly=0;
  renderer.domElement.addEventListener('mousedown',function(e){drag=true;lx=e.clientX;ly=e.clientY});
  window.addEventListener('mousemove',function(e){if(!drag)return;camA+=(e.clientX-lx)*0.005;camP=Math.max(0.15,Math.min(1.4,camP-(e.clientY-ly)*0.005));lx=e.clientX;ly=e.clientY});
  window.addEventListener('mouseup',function(){drag=false});
  renderer.domElement.addEventListener('wheel',function(e){camD=Math.max(20,Math.min(160,camD+e.deltaY*0.05));e.preventDefault()},{passive:false});
  renderer.domElement.addEventListener('touchstart',function(e){if(e.touches.length===1){drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY}});
  renderer.domElement.addEventListener('touchmove',function(e){if(!drag||!e.touches.length)return;camA+=(e.touches[0].clientX-lx)*0.005;camP=Math.max(0.15,Math.min(1.4,camP-(e.touches[0].clientY-ly)*0.005));lx=e.touches[0].clientX;ly=e.touches[0].clientY;e.preventDefault()},{passive:false});
  renderer.domElement.addEventListener('touchend',function(){drag=false});
  document.getElementById('sr2').addEventListener('input',function(){sRate=parseFloat(this.value);document.getElementById('rv').textContent=sRate.toFixed(1)});
  document.getElementById('ssr').addEventListener('input',function(){scRate=parseFloat(this.value);document.getElementById('rsc').textContent=scRate.toFixed(1)});
  document.getElementById('spr').addEventListener('input',function(){pRate=parseFloat(this.value);document.getElementById('rpv').textContent=pRate.toFixed(1)});
  document.getElementById('ca').addEventListener('change',function(){ctrl.mode=this.checked?'adaptive':'fixed'});
  document.getElementById('br').addEventListener('click',function(){stats={thru:0,scThru:0,tw:0,wc:0,ptw:0,pwc:0,col:0,colT:0};totalFlow=0;for(var k in catFlow)catFlow[k]=0;bldgs.forEach(function(b){b.flow=0});startTime=Date.now()});
  window.addEventListener('keydown',function(e){if(e.code==='Space'){e.preventDefault();var cb=document.getElementById('ca');cb.checked=!cb.checked;ctrl.mode=cb.checked?'adaptive':'fixed'}});
  window.addEventListener('resize',function(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
  var clock=new THREE.Clock(),uiT=0;
  (function loop(){requestAnimationFrame(loop);var dt=Math.min(clock.getDelta(),0.05);sim(dt);camera.position.x=camD*Math.cos(camP)*Math.sin(camA);camera.position.y=camD*Math.sin(camP);camera.position.z=camD*Math.cos(camP)*Math.cos(camA);camera.lookAt(0,0,0);uiT+=dt;if(uiT>0.2){uiT=0;ui()}renderer.render(scene,camera)})();
}
